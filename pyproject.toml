[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vulnexploit"
version = "1.0.0"
description = "Comprehensive Vulnerability Scanner and Exploiter"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Topic :: Security",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
    # Core
    "scapy>=2.5.0",
    "aiohttp>=3.8.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    # Network protocols
    "asyncssh>=2.13.0",
    "pysmb>=1.2.6",
    # Reporting
    "jinja2>=3.1.0",
    "reportlab>=4.0.0",
    # AI Agent (LangGraph)
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-anthropic>=0.3.0",
    "docker>=7.0.0",
    # TUI
    "textual>=0.47.0",
    # Token counting
    "tiktoken>=0.5.0",
    # Knowledge graph
    "networkx>=3.0",
    # Memory
    "numpy>=1.24.0",
]

[project.optional-dependencies]
metasploit = ["pymetasploit3>=1.0.0"]
browser = ["playwright>=1.40.0"]
vector = [
    "sentence-transformers>=2.2.0",
]
web = [
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "websockets>=11.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
]
all = [
    "vulnexploit[metasploit,browser,vector,web,dev]",
]

[project.scripts]
vulnexploit = "vulnexploit:main"

[tool.setuptools.packages.find]
include = ["vulnexploit*"]

[tool.setuptools.package-data]
vulnexploit = ["core/config_data/*.yaml", "core/skills/vulnerabilities/*.md", "skills/vulnerabilities/*.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Present but not gated in CI until Phase 4. The select set is deliberately
# conservative — pycodestyle errors, pyflakes, import order, pyupgrade, bugbear.
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line-too-long — deferred; many tool docstrings exceed 100
    "B008",  # function calls in default args — frequent in langgraph/pydantic
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
